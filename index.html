<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Grok Imagine Pro - 视觉稳定版</title>
  <style>
    body { margin:0; padding:0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; background:#111; color:#fff; height:100vh; display:flex; flex-direction:column; overflow:hidden; }
    header { background:#1a1a1a; padding:15px 20px; border-bottom:1px solid #333; }
    .tab-bar { display:flex; background:#1a1a1a; border-bottom:1px solid #333; }
    .tab { flex:1; padding:16px; text-align:center; font-size:17px; font-weight:600; border-bottom:3px solid transparent; cursor:pointer; }
    .tab-active { border-bottom:3px solid #a855f7; color:#a855f7; }
    .content { flex:1; overflow-y:auto; padding:15px; background:#111; padding-bottom:320px; }
    
    /* 分类横向滚动 */
    .category-row { display:flex; overflow-x: auto; gap:8px; margin-bottom:15px; padding-bottom:10px; -webkit-overflow-scrolling: touch; }
    .category-row::-webkit-scrollbar { display: none; }
    .cat-btn { background:#1f1f1f; color:#fff; padding:10px 18px; border-radius:999px; font-size:14px; border:none; white-space:nowrap; cursor:pointer; }
    .cat-btn.active { background:#a855f7; color:#000; font-weight:bold; }

    /* 提示词卡片网格 - 保持视觉稳定 */
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px; }
    .fragment-card { 
      background:#1f1f1f; min-height: 60px; border-radius:16px; position: relative; overflow: hidden; 
      display: flex; align-items: center; justify-content: center; padding: 10px;
      background-size: cover; background-position: center; border: 2px solid transparent;
      transition: border-color 0.2s; /* 仅边框过渡，不影响图片内容 */
      -webkit-touch-callout: none; user-select: none;
    }
    .fragment-card.has-img { height: 110px; align-items: flex-end; }
    /* 选中状态：仅改变边框色和叠加微弱遮罩，图片不变化 */
    .fragment-card.selected { border-color: #a855f7; box-shadow: inset 0 0 0 2px #a855f7; }
    .fragment-card.selected::after { content: ""; position: absolute; inset: 0; background: rgba(168, 85, 247, 0.1); pointer-events: none; }

    .fragment-card .label { position: relative; z-index: 2; width: 100%; text-align: center; font-size: 13px; color: #fff; text-shadow: 0 1px 4px rgba(0,0,0,0.8); }
    .has-img .label { background: rgba(0,0,0,0.6); padding: 6px 0; backdrop-filter: blur(4px); }

    .prompt-box { width:90%; margin:0 auto 20px auto; background:#1f1f1f; border:2px solid #3b82f6; border-radius:20px; padding:18px; }
    textarea { width:100%; background:transparent; border:none; color:#fff; font-size:15px; line-height:1.4; min-height:100px; resize:none; outline: none; }
    
    .bottom-bar { background:#1a1a1a; border-top:1px solid #333; padding:15px; position:fixed; bottom:0; left:0; right:0; z-index:100; }
    .btn-row { display:flex; gap:10px; }
    .btn-row button { flex:1; border-radius:999px; padding:16px; font-size:16px; font-weight:600; border:none; cursor:pointer; }
    .copy-btn { flex:2 !important; background:linear-gradient(90deg,#a855f7,#7c3aed); color:#fff; }

    /* 管理页：分类排序居中半宽 */
    #sort-container { display: flex; flex-direction: column; align-items: center; width: 100%; margin: 10px 0; }
    .sort-item { display:flex; align-items:center; justify-content:space-between; background:#1f1f1f; padding:12px 15px; margin-bottom:8px; border-radius:12px; touch-action: none; width: 50%; box-sizing: border-box; border: 1px solid #333; }
    .sort-handle { color:#666; font-size:18px; }
    
    .upload-zone, .backup-zone { background:#1a1a1a; padding:15px; border-radius:16px; margin-bottom:20px; border: 1px solid #333; }
    .input-field { width:100%; padding:12px; background:#262626; color:#fff; border:none; border-radius:10px; margin-top:10px; box-sizing:border-box; }
    .file-input-label { display:block; padding:12px; background:#262626; border-radius:10px; text-align:center; margin-top:10px; color:#aaa; border: 1px dashed #444; cursor:pointer; }
    .action-btn { width:100%; padding:14px; border-radius:12px; font-weight:bold; border:none; cursor:pointer; margin-top:10px; color:#fff; }
  </style>
</head>
<body>
  <header>
    <div style="font-size:18px;font-weight:700;">📸 Grok Imagine <span style="font-size:10px;color:#888;">视觉词库稳定版</span></div>
  </header>

  <div class="tab-bar">
    <div onclick="switchTab(0)" class="tab tab-active">生成器</div>
    <div onclick="switchTab(1)" class="tab">管理/上传</div>
  </div>

  <div id="page0" class="content">
    <div id="category-row" class="category-row"></div>
    <div id="fragments-grid" class="grid"></div>
    <div class="prompt-box">
      <textarea id="output" placeholder="点击标签组合..."></textarea>
    </div>
  </div>

  <div id="page1" class="content" style="display:none;">
    <div class="upload-zone">
      <h4 style="margin:0;">📸 新增词条</h4>
      <select id="catSelect" class="input-field"></select>
      <input type="text" id="newName" class="input-field" placeholder="显示名称">
      <textarea id="newValue" class="input-field" placeholder="提示词内容"></textarea>
      <div class="file-input-label" onclick="document.getElementById('imgInput').click()" id="fileLabel">🖼️ 点击上传示例图 (可选)</div>
      <input type="file" id="imgInput" style="display:none" onchange="previewImage()" accept="image/*">
      <button onclick="addEntry()" class="action-btn" style="background:#a855f7;">🚀 保存词条</button>
    </div>

    <h4 style="text-align:center; margin:10px 0; color:#888; font-size:14px;">↕️ 分类排序 (按住拖动名称)</h4>
    <div id="sort-container"></div>
    
    <div class="backup-zone">
      <h4 style="margin:0 0 10px 0;">💾 词库备份</h4>
      <button onclick="exportData()" class="action-btn" style="background:#3b82f6;">📥 导出数据备份 (.json)</button>
      <button onclick="document.getElementById('importInput').click()" class="action-btn" style="background:#10b981;">📤 导入数据备份</button>
      <input type="file" id="importInput" style="display:none" onchange="importData(event)" accept=".json">
    </div>
  </div>

  <div class="bottom-bar">
    <div class="btn-row">
      <button onclick="copyPrompt()" class="copy-btn">📋 复制提示词</button>
      <button onclick="clearSelected()" style="background:#333;color:#ff6b6b;">🗑️ 重置选择</button>
    </div>
  </div>

  <script>
    const defaultFragments = { "人物": [], "遮挡": [], "服饰": [], "动作": [], "照明": [] };
    let fragments = {};
    let categoryOrder = [];
    let selected = [];
    let currentCategory = "";

    function initData() {
      // 兼容旧数据
      const saved = localStorage.getItem('grok_visual_data') || localStorage.getItem('grok_imagine_data');
      const savedOrder = localStorage.getItem('grok_category_order');
      if (saved) { fragments = JSON.parse(saved); } 
      else { fragments = JSON.parse(JSON.stringify(defaultFragments)); }
      categoryOrder = savedOrder ? JSON.parse(savedOrder) : Object.keys(fragments);
      currentCategory = categoryOrder[0] || "人物";
      renderAll();
      updateCatSelect();
      renderSortList();
    }

    function renderAll() {
      const catRow = document.getElementById('category-row');
      catRow.innerHTML = '';
      categoryOrder.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = `cat-btn ${cat === currentCategory ? 'active' : ''}`;
        btn.textContent = cat;
        btn.onclick = () => { currentCategory = cat; renderAll(); };
        catRow.appendChild(btn);
      });

      const grid = document.getElementById('fragments-grid');
      grid.innerHTML = '';
      (fragments[currentCategory] || []).forEach((item, index) => {
        const name = typeof item === 'string' ? item : item.name;
        const value = typeof item === 'string' ? item : item.value;
        const img = typeof item === 'object' ? item.img : "";
        const card = document.createElement('div');
        card.className = `fragment-card ${selected.includes(value) ? 'selected' : ''} ${img ? 'has-img' : ''}`;
        
        // 设置背景图，确保点击时样式稳定
        if(img) {
            card.style.backgroundImage = `url(${img})`;
        }

        card.innerHTML = `<div class="label">${name}</div>`;
        
        card.onclick = () => {
          const idx = selected.indexOf(value);
          if(idx > -1) selected.splice(idx,1); else selected.push(value);
          renderAll(); // 重新渲染以更新选中状态，CSS 保证图片不闪烁
          updateOutput();
        };

        // 长按删除
        let timer;
        card.ontouchstart = () => timer = setTimeout(() => {
          if(confirm(`删除词条「${name}」?`)) { fragments[currentCategory].splice(index, 1); saveData(); renderAll(); }
        }, 800);
        card.ontouchend = () => clearTimeout(timer);
        grid.appendChild(card);
      });
    }

    /* 居中半宽排序逻辑 */
    function renderSortList() {
      const container = document.getElementById('sort-container');
      container.innerHTML = '';
      categoryOrder.forEach((cat, index) => {
        const item = document.createElement('div');
        item.className = 'sort-item';
        item.innerHTML = `<span>${cat}</span><span class="sort-handle">☰</span>`;
        item.dataset.index = index;
        item.ontouchstart = handleSortStart;
        item.ontouchmove = handleSortMove;
        item.ontouchend = handleSortEnd;
        container.appendChild(item);
      });
    }

    let dragSrcIndex = null;
    function handleSortStart(e) { dragSrcIndex = this.dataset.index; this.style.opacity = '0.5'; }
    function handleSortMove(e) {
      e.preventDefault();
      const touch = e.touches[0];
      const target = document.elementFromPoint(touch.clientX, touch.clientY);
      const item = target ? target.closest('.sort-item') : null;
      if (item && item.dataset.index !== dragSrcIndex) {
        const targetIndex = item.dataset.index;
        const temp = categoryOrder[dragSrcIndex];
        categoryOrder.splice(dragSrcIndex, 1);
        categoryOrder.splice(targetIndex, 0, temp);
        dragSrcIndex = targetIndex;
        renderSortList();
      }
    }
    function handleSortEnd() { this.style.opacity = '1'; saveData(); renderAll(); }

    function previewImage() {
      const file = document.getElementById('imgInput').files[0];
      if(file) document.getElementById('fileLabel').innerText = `✅ 已选择图片`;
    }

    async function addEntry() {
      const name = document.getElementById('newName').value;
      const val = document.getElementById('newValue').value;
      const file = document.getElementById('imgInput').files[0];
      const cat = document.getElementById('catSelect').value;
      if(!name || !val) return alert("请填写名称和提示词");
      let base64 = "";
      if(file) {
        base64 = await new Promise(r => {
          const rd = new FileReader(); rd.readAsDataURL(file);
          rd.onload = e => r(e.target.result);
        });
      }
      fragments[cat].push({ name, value: val, img: base64 });
      saveData(); renderAll();
      document.getElementById('newName').value = ""; document.getElementById('newValue').value = "";
      document.getElementById('fileLabel').innerText = "🖼️ 点击上传示例图 (可选)";
      alert("词条已保存");
    }

    function exportData() {
      const blob = new Blob([JSON.stringify(fragments)], {type: "application/json"});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `grok_bak_${new Date().getTime()}.json`;
      a.click();
    }

    function importData(e) {
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          fragments = JSON.parse(ev.target.result);
          categoryOrder = Object.keys(fragments);
          saveData(); location.reload();
        } catch(err) { alert("文件格式无效"); }
      };
      reader.readAsText(e.target.files[0]);
    }

    function saveData() {
      localStorage.setItem('grok_visual_data', JSON.stringify(fragments));
      localStorage.setItem('grok_category_order', JSON.stringify(categoryOrder));
    }

    function updateOutput() {
      const prompt = selected.join(', ');
      document.getElementById('output').value = prompt ? `A photorealistic portrait of ${prompt}, a stunning young woman` : "";
    }

    function updateCatSelect() {
      const select = document.getElementById('catSelect');
      select.innerHTML = '';
      categoryOrder.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c; opt.textContent = c;
        select.appendChild(opt);
      });
    }

    function switchTab(n) {
      document.getElementById('page0').style.display = n===0 ? 'block' : 'none';
      document.getElementById('page1').style.display = n===1 ? 'block' : 'none';
      document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('tab-active',i===n));
    }

    function copyPrompt() {
      const txt = document.getElementById('output');
      txt.select();
      navigator.clipboard.writeText(txt.value).then(()=>alert('✅ 已复制到剪贴板'));
    }

    function clearSelected() { selected = []; renderAll(); updateOutput(); }

    window.onload = initData;
  </script>
</body>
</html>
