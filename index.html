<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Grok Imagine 提示词 - 增强版</title>
  <style>
    body { margin:0; padding:0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; background:#111; color:#fff; height:100vh; display:flex; flex-direction:column; overflow:hidden; }
    header { background:#1a1a1a; padding:15px 20px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid #333; }
    .logo { font-size:28px; }
    .tab-bar { display:flex; background:#1a1a1a; border-bottom:1px solid #333; }
    .tab { flex:1; padding:16px; text-align:center; font-size:17px; font-weight:600; border-bottom:3px solid transparent; cursor:pointer; }
    .tab-active { border-bottom:3px solid #a855f7; color:#a855f7; }
    
    .content { flex:1; overflow-y:auto; padding:15px; background:#111; padding-bottom:300px; }
    
    .category-row { 
      display:flex; 
      overflow-x: auto; 
      gap:8px; 
      margin-bottom:15px; 
      padding-bottom:10px;
      -webkit-overflow-scrolling: touch;
    }
    .category-row::-webkit-scrollbar { display: none; }
    
    .cat-btn { 
      background:#1f1f1f; 
      color:#fff; 
      padding:10px 18px; 
      border-radius:999px; 
      font-size:14px; 
      border:none; 
      white-space:nowrap; 
      cursor:pointer; 
    }
    .cat-btn.active { background:#a855f7; color:#000; font-weight:bold; }
    
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px; }
    .fragment-card { background:#1f1f1f; padding:18px 12px; border-radius:16px; text-align:center; font-size:15px; cursor:pointer; border: 1px solid transparent; }
    .fragment-card.selected { border-color: #a855f7; background: #2d1b4d; }
    
    .prompt-box { width:90%; margin:0 auto 20px auto; background:#1f1f1f; border:2px solid #3b82f6; border-radius:20px; padding:18px; }
    textarea { width:100%; background:transparent; border:none; color:#fff; font-size:16px; line-height:1.5; min-height:120px; resize:none; }
    
    .bottom-bar { background:#1a1a1a; border-top:1px solid #333; padding:15px; position:fixed; bottom:0; left:0; right:0; z-index:100; }
    .btn-row { display:flex; gap:10px; }
    .btn-row button { flex:1; border-radius:999px; padding:18px; font-size:16px; font-weight:600; border:none; cursor:pointer; }
    .copy-btn { flex:2 !important; background:linear-gradient(90deg,#a855f7,#7c3aed); color:#fff; }
    .clear-btn { flex:1 !important; background:#333; color:#ff6b6b; }
    
    .sort-item { 
      display:flex; align-items:center; justify-content:space-between;
      background:#1f1f1f; padding:15px; margin-bottom:8px; border-radius:12px;
      touch-action: none;
    }
    .sort-handle { color:#666; font-size:20px; }

    .backup-zone { margin-top: 20px; padding: 15px; background: #1a1a1a; border-radius: 16px; border: 1px dashed #444; }
    .action-btn { width:100%; padding:12px; border-radius:12px; margin-bottom:10px; font-weight:bold; border:none; cursor:pointer;}
  </style>
</head>
<body>
  <header>
    <div style="display:flex;align-items:center;">
      <span class="logo">📸</span>
      <div style="margin-left:8px">
        <div style="font-size:18px;font-weight:700;">Grok Imagine</div>
        <div style="font-size:11px;color:#888;">支持手指横滑分类 & 拖拽排序</div>
      </div>
    </div>
  </header>

  <div class="tab-bar">
    <div onclick="switchTab(0)" class="tab tab-active">生成器</div>
    <div onclick="switchTab(1)" class="tab">管理/排序</div>
  </div>

  <div id="page0" class="content">
    <div id="category-row" class="category-row"></div>
    <div id="fragments-grid" class="grid"></div>
    <div class="prompt-box">
      <textarea id="output" placeholder="点击上方标签组合提示词..."></textarea>
    </div>
  </div>

  <div id="page1" class="content" style="display:none;">
    <h4 style="margin:0 0 10px 0;">批量录入</h4>
    <select id="catSelect" style="width:100%;padding:12px;background:#1f1f1f;color:#fff;border:none;border-radius:12px;margin-bottom:10px;"></select>
    <textarea id="bulkInput" placeholder="每行一个词..." style="min-height:80px; background:#1f1f1f; padding:10px; border-radius:12px;"></textarea>
    <button onclick="bulkAdd()" class="action-btn" style="background:#a855f7;color:#fff;">🚀 添加到该分类</button>
    
    <button onclick="if(confirm('确定要重置所有分类和词条吗？这将清除你自定义的内容。')){localStorage.clear();location.reload();}" class="action-btn" style="background:#ff6b6b;color:#fff;margin-top:10px;">⚠️ 重置所有默认分类</button>

    <h4 style="margin:20px 0 10px 0;">分类排序 (手指按住拖动)</h4>
    <div id="sort-container"></div>

    <div class="backup-zone">
      <button onclick="exportData()" class="action-btn" style="background:#3b82f6;color:#fff;">💾 导出备份 (.json)</button>
      <button onclick="document.getElementById('fileInput').click()" class="action-btn" style="background:#10b981;color:#fff;">📂 导入备份</button>
      <input type="file" id="fileInput" style="display:none" onchange="importData(event)" accept=".json">
    </div>
  </div>

  <div class="bottom-bar">
    <div class="btn-row">
      <button onclick="copyPrompt()" class="copy-btn">📋 复制提示词</button>
      <button onclick="clearSelected()" class="clear-btn">🗑️ 重置</button>
    </div>
  </div>

  <script>
    const defaultFragments = {
      "人物": ["a beautiful elegant Asian girl", "a stunning young woman"],
      "第二人物": ["a handsome man standing beside", "a small child playing nearby"],
      "场景": ["in a cyberpunk city neon street", "inside a traditional Japanese zen garden", "on a misty mountain top"],
      "遮挡": ["face partially covered by hands", "half face hidden in shadow", "peeking from behind a curtain", "hair covering one eye", "silhouette in the fog", "masked mysterious look"],
      "临时A": ["temporary prompt A1", "temporary prompt A2"],
      "临时B": ["temporary prompt B1", "temporary prompt B2"],
      "服饰": ["flowing white dress", "traditional Chinese hanfu", "modern leather jacket"],
      "动作": ["turning head gently", "looking over shoulder", "walking gracefully"],
      "照明": ["golden hour soft light", "rim lighting", "neon light"],
      "镜头": ["85mm f/1.4 lens", "creamy bokeh"],
      "氛围": ["futuristic atmosphere", "dreamy cinematic mood"],
      "质量": ["cinematic masterpiece", "ultra detailed", "photorealistic"],
      "负面提示词": ["blurry", "low quality", "deformed", "watermark"]
    };

    let fragments = {};
    let categoryOrder = [];
    let selected = [];
    let currentCategory = "人物";

    function initData() {
      const saved = localStorage.getItem('grok_imagine_data');
      const savedOrder = localStorage.getItem('grok_category_order');
      
      if (saved) {
        fragments = JSON.parse(saved);
      } else {
        fragments = JSON.parse(JSON.stringify(defaultFragments));
      }

      // 确保新分类被加入排序列表
      const allCats = Object.keys(fragments);
      if (savedOrder) {
        categoryOrder = JSON.parse(savedOrder);
        allCats.forEach(cat => {
          if(!categoryOrder.includes(cat)) categoryOrder.push(cat);
        });
      } else {
        categoryOrder = allCats;
      }
      
      currentCategory = categoryOrder[0];
      renderAll();
      updateCatSelect();
      renderSortList();
    }

    function saveData() {
      localStorage.setItem('grok_imagine_data', JSON.stringify(fragments));
      localStorage.setItem('grok_category_order', JSON.stringify(categoryOrder));
    }

    function renderAll() {
      const container = document.getElementById('category-row');
      container.innerHTML = '';
      categoryOrder.forEach(cat => {
        if(!fragments[cat]) return;
        const btn = document.createElement('button');
        btn.className = `cat-btn ${cat === currentCategory ? 'active' : ''}`;
        btn.textContent = cat;
        btn.onclick = () => { currentCategory = cat; renderAll(); };
        container.appendChild(btn);
      });

      const grid = document.getElementById('fragments-grid');
      grid.innerHTML = '';
      (fragments[currentCategory] || []).forEach(text => {
        const isSelected = selected.includes(text);
        const card = document.createElement('div');
        card.className = `fragment-card ${isSelected ? 'selected' : ''}`;
        card.textContent = text;
        card.onclick = () => {
          const idx = selected.indexOf(text);
          if(idx > -1) selected.splice(idx,1); else selected.push(text);
          renderAll();
          updateOutput();
        };
        grid.appendChild(card);
      });
    }

    function renderSortList() {
      const container = document.getElementById('sort-container');
      container.innerHTML = '';
      categoryOrder.forEach((cat, index) => {
        const item = document.createElement('div');
        item.className = 'sort-item';
        item.innerHTML = `<span>${cat}</span><span class="sort-handle">☰</span>`;
        item.dataset.index = index;
        item.addEventListener('touchstart', handleTouchStart, false);
        item.addEventListener('touchmove', handleTouchMove, false);
        item.addEventListener('touchend', handleTouchEnd, false);
        container.appendChild(item);
      });
    }

    let dragSrcIndex = null;
    function handleTouchStart(e) {
      dragSrcIndex = this.dataset.index;
      this.style.opacity = '0.5';
    }

    function handleTouchMove(e) {
      e.preventDefault();
      const touch = e.touches[0];
      const target = document.elementFromPoint(touch.clientX, touch.clientY);
      const item = target ? target.closest('.sort-item') : null;
      if (item && item.dataset.index !== dragSrcIndex) {
        const targetIndex = item.dataset.index;
        const temp = categoryOrder[dragSrcIndex];
        categoryOrder.splice(dragSrcIndex, 1);
        categoryOrder.splice(targetIndex, 0, temp);
        dragSrcIndex = targetIndex;
        renderSortList();
      }
    }

    function handleTouchEnd() {
      this.style.opacity = '1';
      saveData();
      renderAll();
    }

    function updateOutput() {
      const mainItems = selected.filter(item => !fragments["负面提示词"].includes(item));
      const negatives = selected.filter(item => fragments["负面提示词"].includes(item));
      let promptText = mainItems.join(', ');
      if (negatives.length > 0) promptText += ` without ${negatives.join(', ')}`;
      document.getElementById('output').value = promptText ? `A photorealistic portrait of ${promptText}` : "";
    }

    function updateCatSelect() {
      const select = document.getElementById('catSelect');
      select.innerHTML = '';
      categoryOrder.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c; opt.textContent = c;
        select.appendChild(opt);
      });
    }

    function bulkAdd() {
      const input = document.getElementById('bulkInput');
      const lines = input.value.trim().split('\n').filter(l=>l.trim());
      if(lines.length===0) return;
      const cat = document.getElementById('catSelect').value;
      fragments[cat] = [...new Set([...(fragments[cat] || []), ...lines])];
      saveData();
      input.value = '';
      alert('✅ 已添加');
      renderAll();
    }

    function switchTab(n) {
      document.getElementById('page0').style.display = n===0 ? 'block' : 'none';
      document.getElementById('page1').style.display = n===1 ? 'block' : 'none';
      document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('tab-active',i===n));
    }

    function copyPrompt() {
      const txt = document.getElementById('output');
      txt.select();
      navigator.clipboard.writeText(txt.value).then(()=>alert('✅ 已复制'));
    }

    function clearSelected() { selected = []; renderAll(); updateOutput(); }
    
    function exportData() {
      const blob = new Blob([JSON.stringify(fragments)], {type: "application/json"});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'grok_prompts.json';
      a.click();
    }

    function importData(e) {
      const reader = new FileReader();
      reader.onload = (ev) => {
        fragments = JSON.parse(ev.target.result);
        categoryOrder = Object.keys(fragments);
        saveData();
        location.reload();
      };
      reader.readAsText(e.target.files[0]);
    }

    window.onload = initData;
  </script>
</body>
</html>
